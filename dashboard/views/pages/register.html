<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - ESP32-S3 Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;
               display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px; }
        .reg-card { max-width: 440px; width: 100%; border: none; border-radius: 15px;
                    box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .reg-header { text-align: center; padding: 28px 20px 20px;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      color: white; border-radius: 15px 15px 0 0; }
        .reg-body { padding: 28px; background: white; border-radius: 0 0 15px 15px; }
    </style>
</head>
<body>
<div class="reg-card">
    <div class="reg-header">
        <i class="bi bi-person-plus-fill" style="font-size:2.5rem;"></i>
        <h4 class="mt-2 mb-0">Create Your Account</h4>
        <p class="small mb-0 mt-1 opacity-75">You've been invited to ESP32-S3 Manager</p>
    </div>
    <div class="reg-body">
        <% if (error_msg && error_msg.length > 0) { %>
        <div class="alert alert-danger py-2 small"><i class="bi bi-x-circle me-1"></i><%= error_msg[0] || error_msg %></div>
        <% } %>

        <form method="POST" action="/auth/register">
            <input type="hidden" name="token" value="<%= token %>">

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="username" required minlength="3" maxlength="50"
                       pattern="[a-zA-Z0-9_.\-]+" value="">
                <label for="username"><i class="bi bi-person me-1"></i>Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="name" name="name"
                       placeholder="Full Name" required maxlength="100" value="">
                <label for="name"><i class="bi bi-card-text me-1"></i>Full Name</label>
            </div>

            <% if (email) { %>
            <div class="mb-3">
                <label class="form-label small text-muted">Email</label>
                <input type="text" class="form-control form-control-sm bg-light" value="<%= email %>" disabled>
            </div>
            <% } %>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Password" required minlength="8">
                <label for="password"><i class="bi bi-lock me-1"></i>Password</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password_confirm" name="password_confirm"
                       placeholder="Confirm Password" required minlength="8">
                <label for="password_confirm"><i class="bi bi-lock-fill me-1"></i>Confirm Password</label>
            </div>

            <div class="mb-3 p-2 bg-light rounded small text-muted">
                <i class="bi bi-shield-check me-1"></i>
                Your account will be created with role: <strong><%= role %></strong>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-person-check me-1"></i>Create Account
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="/auth/login" class="text-muted small">Already have an account? Sign in</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Client-side password match check
document.querySelector('form').addEventListener('submit', function(e) {
    const p1 = document.getElementById('password').value;
    const p2 = document.getElementById('password_confirm').value;
    if (p1 !== p2) {
        e.preventDefault();
        alert('Passwords do not match');
    }
});
</script>
</body>
</html>
