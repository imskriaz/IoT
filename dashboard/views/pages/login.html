<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Device Bridge</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            background:
                radial-gradient(circle at top right, rgba(246,183,60,0.2), transparent 24%),
                linear-gradient(135deg, #041f1d 0%, #0f5c4d 100%);
        }
        .login-card {
            max-width: 430px;
            width: 100%;
            border: none;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 24px 70px rgba(2,16,14,0.24);
        }
        .login-header {
            text-align: center;
            padding: 32px 24px 24px;
            background: linear-gradient(135deg, #0f5c4d 0%, #127d67 100%);
            color: white;
        }
        .login-header i {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .login-body {
            padding: 30px;
            background: white;
        }
        .form-floating {
            margin-bottom: 15px;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0f5c4d 0%, #127d67 100%);
            border: none;
            color: white;
            font-weight: 600;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(15,92,77,0.28);
        }
        .login-links a {
            color: #0f5c4d;
            font-weight: 600;
        }
        .login-links a:hover {
            color: #0b463b;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-cpu"></i>
            <h3>Device Bridge</h3>
            <p class="mb-0">Dashboard, onboarding, and per-device package control</p>
        </div>
        <div class="login-body">
            <% if (error_msg && error_msg.length > 0) { %>
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <%= error_msg %>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            <% } %>
            
            <form action="/auth/login" method="POST">
                <input type="hidden" name="_csrf" value="<%= csrfToken || '' %>">
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username" 
                           placeholder="Username" required autofocus>
                    <label for="username">Username</label>
                </div>
                
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" 
                           placeholder="Password" required>
                    <label for="password">Password</label>
                </div>
                
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                
                <button type="submit" class="btn btn-login btn-lg">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </button>
                
                <div class="text-center mt-3">
                    <a href="/auth/forgot-password" class="text-muted small">Forgot password?</a>
                </div>
            </form>
            <div class="login-links d-flex flex-column gap-2 text-center mt-4 small">
                <a href="/auth/signup" class="text-decoration-none">Create new account</a>
                <a href="/" class="text-decoration-none">View packages and pricing</a>
            </div>
        </div>
    </div>
</body>
</html>
