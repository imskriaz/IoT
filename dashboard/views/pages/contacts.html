<!-- Contact Management -->
<div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
    <div>
        <h2 class="mb-1">
            <i class="bi bi-person-lines-fill me-2"></i>Contact Management
        </h2>
        <p class="text-muted mb-0">Manage all your contacts in one place</p>
    </div>
    <div class="d-flex gap-2 flex-wrap">
        <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                <i class="bi bi-download me-1"></i>Export
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="/api/contacts/export/csv" download><i class="bi bi-filetype-csv me-2"></i>CSV</a></li>
                <li><a class="dropdown-item" href="/api/contacts/export/vcf" download><i class="bi bi-person-vcard me-2"></i>vCard (.vcf)</a></li>
            </ul>
        </div>
        <div class="dropdown">
            <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                <i class="bi bi-upload me-1"></i>Import
            </button>
            <ul class="dropdown-menu">
                <li>
                    <label class="dropdown-item" title="Import contacts from CSV">
                        <i class="bi bi-filetype-csv me-2"></i>CSV
                        <input type="file" accept=".csv" class="d-none" id="importCsvInput" onchange="importContactsCsv(this)">
                    </label>
                </li>
                <li>
                    <label class="dropdown-item" title="Import contacts from vCard (.vcf)">
                        <i class="bi bi-person-vcard me-2"></i>vCard (.vcf)
                        <input type="file" accept=".vcf,.vcard" class="d-none" id="importVcfInput" onchange="importContactsVcf(this)">
                    </label>
                </li>
            </ul>
        </div>
        <button class="btn btn-primary" onclick="showAddContactModal()">
            <i class="bi bi-person-plus me-2"></i>Add New Contact
        </button>
    </div>
</div>

<!-- Stats Cards -->
<div class="row g-3 mb-4">
    <div class="col-6 col-md-4">
        <div class="card bg-primary bg-opacity-10 border-0">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="flex-shrink-0">
                        <i class="bi bi-people fs-2 text-primary"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="mb-1">Total Contacts</h6>
                        <h4 class="mb-0" id="totalContacts">0</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-6 col-md-4">
        <div class="card bg-warning bg-opacity-10 border-0">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="flex-shrink-0">
                        <i class="bi bi-star-fill fs-2 text-warning"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="mb-1">Favorites</h6>
                        <h4 class="mb-0" id="favoriteCount">0</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12 col-md-4">
        <div class="card bg-success bg-opacity-10 border-0">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="flex-shrink-0">
                        <i class="bi bi-building fs-2 text-success"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="mb-1">Companies</h6>
                        <h4 class="mb-0" id="companyCount">0</h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Search Bar -->
<div class="card mb-4">
    <div class="card-body">
        <div class="input-group">
            <span class="input-group-text bg-white">
                <i class="bi bi-search"></i>
            </span>
            <input type="text" class="form-control" id="searchContacts" placeholder="Search by name, phone, or email...">
        </div>
    </div>
</div>

<!-- Quick Filters -->
<div class="mb-4 d-flex gap-2 flex-wrap">
    <button class="btn btn-outline-primary btn-sm" onclick="filterFavorites(true)">
        <i class="bi bi-star-fill me-1"></i>Favorites
    </button>
    <button class="btn btn-outline-secondary btn-sm" onclick="filterFavorites(false)">
        <i class="bi bi-star me-1"></i>All Contacts
    </button>
</div>

<!-- Contacts Grid -->
<div class="row" id="contactsContainer">
    <!-- Contacts will be loaded here -->
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
</div>

<!-- Pagination -->
<nav class="mt-4" id="paginationContainer">
    <ul class="pagination justify-content-center" id="contactsPagination">
        <!-- Populated by JavaScript -->
    </ul>
</nav>

<!-- Add/Edit Contact Modal -->
<div class="modal fade" id="addContactModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="contactModalTitle">
                    <i class="bi bi-person-plus me-2"></i>Add New Contact
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="contactForm" onsubmit="return false;">
                    <input type="hidden" id="contactId">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Name *</label>
                        <input type="text" class="form-control" id="contactName" required>
                        <div class="invalid-feedback">Name is required</div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phone Number *</label>
                        <input type="tel" class="form-control" id="contactPhone" data-intl-tel-input required>
                        <div class="invalid-feedback">Phone number is required</div>
                        <small class="text-muted">Select a country or paste a full international number</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control" id="contactEmail">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Company</label>
                        <input type="text" class="form-control" id="contactCompany">
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="contactFavorite">
                            <label class="form-check-label" for="contactFavorite">Add to favorites</label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Notes</label>
                        <textarea class="form-control" id="contactNotes" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger d-none" id="deleteContactBtn">Delete</button>
                <button type="button" class="btn btn-primary" id="saveContactBtn">Save Contact</button>
            </div>
        </div>
    </div>
</div>

<!-- Contact Detail Modal (View Only) -->
<div class="modal fade" id="contactDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-person-circle me-2"></i>Contact Details
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="contactDetailContent">
                <!-- Populated by JavaScript -->
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-success" onclick="quickCallFromDetail()">
                    <i class="bi bi-telephone me-2"></i>Call
                </button>
                <button type="button" class="btn btn-info" onclick="quickSmsFromDetail()">
                    <i class="bi bi-chat-dots me-2"></i>SMS
                </button>
                <button type="button" class="btn btn-primary" onclick="editContactFromDetail()">
                    <i class="bi bi-pencil me-2"></i>Edit
                </button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Load Contacts page script -->
<script src="/js/contacts.js"></script>

<script>
function importContactsCsv(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const fd = new FormData();
    fd.append('file', file);
    input.value = '';

    fetch('/api/contacts/import/csv', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                alert(`${data.message}`);
                if (typeof loadContacts === 'function') loadContacts(1);
            } else {
                alert('Import failed: ' + (data.message || 'Unknown error'));
            }
        })
        .catch(() => alert('Import failed: network error'));
}

function importContactsVcf(input) {
    if (!input.files || !input.files[0]) return;
    const file = input.files[0];
    const fd = new FormData();
    fd.append('file', file);
    input.value = '';

    fetch('/api/contacts/import/vcf', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                if (typeof showToast === 'function') showToast(`Imported ${data.imported} contacts (${data.skipped} skipped)`, 'success');
                else alert(`Imported ${data.imported} contacts (${data.skipped} skipped)`);
                if (typeof loadContacts === 'function') loadContacts(1);
            } else {
                alert('vCard import failed: ' + (data.message || 'Unknown error'));
            }
        })
        .catch(() => alert('vCard import failed: network error'));
}
</script>
