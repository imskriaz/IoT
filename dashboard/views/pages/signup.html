<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Device Bridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #041f1d 0%, #0f5c4d 100%);
        }
        .signup-card {
            max-width: 460px;
            width: 100%;
            border: none;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.22);
        }
        .signup-header {
            color: #fff;
            padding: 28px 24px 22px;
            background: linear-gradient(135deg, #0f5c4d 0%, #127d67 100%);
        }
        .signup-body {
            background: #fff;
            padding: 24px;
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="signup-header">
            <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-person-plus-fill fs-2"></i>
                <div>
                    <h3 class="mb-0">Create Account</h3>
                    <div class="small opacity-75">Register as a device user</div>
                </div>
            </div>
        </div>
        <div class="signup-body">
            <% if (error_msg && error_msg.length > 0) { %>
                <div class="alert alert-danger py-2"><%= error_msg[0] || error_msg %></div>
            <% } %>
            <% if (success_msg && success_msg.length > 0) { %>
                <div class="alert alert-success py-2"><%= success_msg[0] || success_msg %></div>
            <% } %>

            <form method="POST" action="/auth/signup">
                <div class="form-floating mb-3">
                    <input class="form-control" id="signupUsername" name="username" placeholder="Username" required minlength="3" maxlength="30">
                    <label for="signupUsername">Username</label>
                </div>
                <div class="form-floating mb-3">
                    <input class="form-control" id="signupName" name="name" placeholder="Full name" required maxlength="100">
                    <label for="signupName">Full name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="signupEmail" name="email" placeholder="Email" required>
                    <label for="signupEmail">Email</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="signupPassword" name="password" placeholder="Password" required minlength="8">
                    <label for="signupPassword">Password</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="signupPasswordConfirm" name="password_confirm" placeholder="Confirm password" required minlength="8">
                    <label for="signupPasswordConfirm">Confirm password</label>
                </div>
                <button class="btn btn-success w-100 py-2" type="submit">
                    <i class="bi bi-person-check me-2"></i>Create Account
                </button>
            </form>

            <div class="text-center mt-3 small">
                <a href="/auth/login" class="text-decoration-none">Already have an account? Log in</a>
            </div>
        </div>
    </div>
</body>
</html>
