<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - ESP32-S3 Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 25px 20px;
            border-radius: 15px 15px 0 0;
            border: none;
        }
        .card-header i { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .card-body { padding: 30px; background: white; border-radius: 0 0 15px 15px; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
        }
        .btn-submit:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <i class="bi bi-shield-lock"></i>
            <h5 class="mb-1">Change Password</h5>
            <small class="opacity-75">You must set a new password before continuing</small>
        </div>
        <div class="card-body">
            <% if (error_msg && error_msg.length > 0) { %>
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <%= error_msg %>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            <% } %>

            <form action="/auth/change-password" method="POST">
                <input type="hidden" name="_csrf" value="<%= csrfToken || '' %>">
                <div class="mb-3">
                    <label for="newPassword" class="form-label fw-semibold">New Password</label>
                    <input type="password" class="form-control" id="newPassword" name="newPassword"
                           placeholder="Minimum 8 characters" required minlength="8">
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                           placeholder="Repeat new password" required minlength="8">
                </div>
                <button type="submit" class="btn btn-submit">
                    <i class="bi bi-check-circle me-2"></i>Set New Password
                </button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
