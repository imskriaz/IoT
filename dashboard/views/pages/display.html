<div class="container-fluid py-4">
    <%- include('../partials/cap-banner.html', { cap: 'display', label: 'SSD1306 OLED display (compiled with ENABLE_DISPLAY)' }) %>
    <div class="row mb-3">
        <div class="col">
            <h4 class="mb-0"><i class="bi bi-display me-2 text-primary"></i>Display Control</h4>
            <small class="text-muted">Send text, graphics and animations to the device display</small>
        </div>
    </div>

    <!-- Send Text -->
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header fw-semibold"><i class="bi bi-fonts me-2"></i>Display Text</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Text</label>
                        <textarea id="displayText" class="form-control" rows="3" placeholder="Hello, World!"></textarea>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">X</label>
                            <input type="number" id="displayX" class="form-control" value="0" min="0">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Y</label>
                            <input type="number" id="displayY" class="form-control" value="0" min="0">
                        </div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">Size</label>
                            <select id="displaySize" class="form-select">
                                <option value="1">Small</option>
                                <option value="2" selected>Medium</option>
                                <option value="3">Large</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Color</label>
                            <select id="displayColor" class="form-select">
                                <option value="white">White</option>
                                <option value="black">Black</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100" onclick="sendDisplayText()">
                        <i class="bi bi-send me-1"></i>Send to Display
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header fw-semibold"><i class="bi bi-sliders me-2"></i>Display Control</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Brightness (0–255)</label>
                        <input type="range" id="displayBrightness" class="form-range" min="0" max="255" value="128"
                               oninput="document.getElementById('brightnessVal').textContent=this.value">
                        <small class="text-muted">Value: <span id="brightnessVal">128</span></small>
                    </div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-secondary" onclick="sendDisplayCmd('clear')">
                            <i class="bi bi-eraser me-1"></i>Clear Screen
                        </button>
                        <button class="btn btn-outline-primary" onclick="sendDisplayCmd('flip')">
                            <i class="bi bi-arrow-left-right me-1"></i>Flip Display
                        </button>
                        <button class="btn btn-outline-warning" onclick="sendDisplayCmd('invert')">
                            <i class="bi bi-circle-half me-1"></i>Invert Colors
                        </button>
                        <button class="btn btn-outline-danger" onclick="sendDisplayCmd('off')">
                            <i class="bi bi-power me-1"></i>Turn Off
                        </button>
                        <button class="btn btn-outline-success" onclick="sendDisplayCmd('on')">
                            <i class="bi bi-power me-1"></i>Turn On
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const DEVICE_ID = window.getActiveDeviceId ? window.getActiveDeviceId() : '';

function sendDisplayText() {
    const text  = document.getElementById('displayText').value.trim();
    const x     = parseInt(document.getElementById('displayX').value) || 0;
    const y     = parseInt(document.getElementById('displayY').value) || 0;
    const size  = parseInt(document.getElementById('displaySize').value) || 2;
    const color = document.getElementById('displayColor').value;
    if (!text) return showToast('Enter text first', 'warning');
    fetch('/api/gpio/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceId: DEVICE_ID, command: 'display-text', params: { text, x, y, size, color } })
    }).then(r => r.json()).then(d => {
        showToast(d.success ? 'Text sent' : (d.error || 'Failed'), d.success ? 'success' : 'danger');
    }).catch(() => showToast('Request failed', 'danger'));
}

function sendDisplayCmd(cmd) {
    const brightness = parseInt(document.getElementById('displayBrightness').value);
    fetch('/api/gpio/command', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceId: DEVICE_ID, command: 'display-' + cmd,
            params: cmd === 'brightness' ? { value: brightness } : {} })
    }).then(r => r.json()).then(d => {
        showToast(d.success ? 'Command sent' : (d.error || 'Failed'), d.success ? 'success' : 'danger');
    }).catch(() => showToast('Request failed', 'danger'));
}
</script>
