<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Authentication - ESP32-S3 Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 400px;
            width: 100%;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .token-input {
            letter-spacing: 0.5em;
            font-size: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill fs-1 text-primary"></i>
                <h4 class="mt-2 mb-1">Two-Factor Authentication</h4>
                <p class="text-muted small">Enter the 6-digit code from your authenticator app</p>
            </div>

            <% if (error_msg && error_msg.length > 0) { %>
            <div class="alert alert-danger py-2">
                <i class="bi bi-exclamation-circle me-1"></i><%= error_msg %>
            </div>
            <% } %>

            <form method="POST" action="/auth/2fa" autocomplete="off">
                <input type="hidden" name="_csrf" value="<%= typeof csrfToken !== 'undefined' ? csrfToken : '' %>">
                <div class="mb-3">
                    <input type="text" class="form-control token-input" name="token"
                        placeholder="000000" maxlength="6" pattern="\d{6}" inputmode="numeric"
                        autofocus autocomplete="one-time-code" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-check-circle me-1"></i>Verify
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="/auth/login" class="text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Back to login
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
